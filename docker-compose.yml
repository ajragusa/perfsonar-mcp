version: '3.8'

services:
  perfsonar-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    image: perfsonar-mcp:latest
    container_name: perfsonar-mcp-server
    environment:
      - PERFSONAR_HOST=${PERFSONAR_HOST:-uct2-net1.mwt2.org}
      - LOOKUP_SERVICE_URL=${LOOKUP_SERVICE_URL:-http://35.223.142.206:8090/lookup}
      - PSCHEDULER_URL=${PSCHEDULER_URL}
    restart: unless-stopped
    # Configure DNS servers for proper hostname resolution
    dns:
      - 8.8.8.8
      - 8.8.4.4
    # For stdio transport, no ports needed
    ports:
      - "8000:8000"
    stdin_open: true
    tty: true
